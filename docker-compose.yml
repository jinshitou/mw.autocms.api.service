version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: eyou_admin
      POSTGRES_PASSWORD: eyou_secure_pass_2026
      POSTGRES_DB: eyou_saas
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    # 💡 魔法指令 1：强制忽略 ARM64 架构的内核警告，防止 Redis 自杀
    command: redis-server --ignore-warnings ARM64-COW-BUG

  backend_api:
    build: ./backend
    restart: always
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - /root/.ssh:/root/.ssh:ro
    ports:
      - "8230:8000"
    environment:
      - DATABASE_URL=postgresql://eyou_admin:eyou_secure_pass_2026@db:5432/eyou_saas
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  # 💡 魔法指令 2：失踪的 Celery 大军重新归队！
  celery_worker:
    build: ./backend
    restart: always
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - /root/.ssh:/root/.ssh:ro
    environment:
      - DATABASE_URL=postgresql://eyou_admin:eyou_secure_pass_2026@db:5432/eyou_saas
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  pg_data: