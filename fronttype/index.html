<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量易优 V1.1 - 生产控制台@HWC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { darkbg: '#111827', panelbg: '#1F2937', panelborder: '#374151', brand: '#3B82F6', danger: '#EF4444', success: '#10B981', warning: '#F59E0B' } }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 3px; }
        body { font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .toast-enter-active, .toast-leave-active { transition: all 0.3s ease; }
        .toast-enter-from, .toast-leave-to { opacity: 0; transform: translateY(-20px); }
        .modal-bg { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-darkbg text-gray-200 h-screen overflow-hidden flex">

<div id="app" class="flex h-full w-full relative">
    
    <div class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none">
        <transition-group name="toast">
            <div v-for="msg in toasts" :key="msg.id" :class="['px-4 py-2 rounded shadow-lg text-sm flex items-center', msg.type === 'success' ? 'bg-success text-white' : (msg.type === 'error' ? 'bg-danger text-white' : 'bg-brand text-white')]">
                <i :class="['fa-solid mr-2', msg.type === 'success' ? 'fa-circle-check' : (msg.type === 'error' ? 'fa-circle-exclamation' : 'fa-spinner fa-spin')]"></i>
                {{ msg.text }}
            </div>
        </transition-group>
    </div>

    <aside class="w-56 bg-panelbg border-r border-panelborder flex flex-col justify-between shrink-0">
        <div>
            <div class="h-16 flex items-center px-6 border-b border-panelborder">
                <i class="fa-solid fa-layer-group text-brand text-2xl"></i>
                <span class="ml-3 font-bold text-lg text-white tracking-widest">批量易优</span>
            </div>
            <div class="p-3 space-y-2">
                <div class="text-xs font-bold text-gray-500 mb-2 uppercase px-3 mt-4">核心工作流</div>
                <button type="button" @click="currentTab = 'servers'" :class="['w-full px-3 py-2 rounded-lg flex items-center transition-colors text-sm', currentTab === 'servers' ? 'bg-brand/10 text-brand font-bold' : 'text-gray-400 hover:bg-panelborder hover:text-white']">
                    <i class="fa-solid fa-server w-6 text-center"></i><span class="ml-2">服务器资产管理</span>
                </button>
                <button type="button" @click="currentTab = 'bulk_deploy'" :class="['w-full px-3 py-2 rounded-lg flex items-center transition-colors text-sm', currentTab === 'bulk_deploy' ? 'bg-brand/10 text-brand font-bold' : 'text-gray-400 hover:bg-panelborder hover:text-white']">
                    <i class="fa-solid fa-rocket w-6 text-center"></i><span class="ml-2">批量一键上站</span>
                </button>
            </div>
        </div>
        <div class="p-4 border-t border-panelborder bg-gray-800/50">
            <div class="flex items-center justify-between text-xs">
                <span class="text-gray-400">后端状态:</span>
                <span v-if="apiStatus === 'online'" class="text-success font-bold">已连接</span>
                <span v-else-if="apiStatus === 'offline'" class="text-danger font-bold">断开</span>
                <span v-else class="text-warning">检测中</span>
            </div>
            <div class="text-[10px] text-gray-500 mt-1 truncate">{{ apiUrl }}</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-darkbg">
        <div class="flex-1 overflow-auto p-6">
            
            <div v-show="currentTab === 'servers'" class="h-full flex flex-col max-w-6xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-white">🖥️ 目标站群服务器管理</h2>
                    <button type="button" @click="showAddServerModal = true" class="bg-brand hover:bg-brand/80 text-white px-4 py-2 rounded text-sm font-bold shadow transition-colors">
                        <i class="fa-solid fa-plus mr-1"></i> 录入新服务器
                    </button>
                </div>
                <div class="bg-panelbg border border-panelborder rounded-xl shadow-lg overflow-hidden">
                    <table class="w-full text-left text-sm text-gray-300">
                        <thead class="bg-gray-800/50 text-xs uppercase text-gray-400 border-b border-panelborder">
                            <tr>
                                <th class="px-6 py-4">备注名</th>
                                <th class="px-6 py-4">主控 IP</th>
                                <th class="px-6 py-4">IP 池总容量</th>
                                <th class="px-6 py-4 text-center">状态</th>
                                <th class="px-6 py-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-if="servers.length === 0">
                                <td colspan="5" class="px-6 py-10 text-center text-gray-500">暂无数据</td>
                            </tr>
                            <tr v-for="server in servers" :key="server.id" class="border-b border-panelborder hover:bg-gray-700/20">
                                <td class="px-6 py-4 font-bold text-white">{{ server.name }}</td>
                                <td class="px-6 py-4">{{ server.main_ip }}</td>
                                <td class="px-6 py-4"><span class="bg-blue-900/50 text-brand py-1 px-2 rounded text-xs font-bold">{{ (server.ip_pool || '').split(',').length }} 个可用 IP</span></td>
                                <td class="px-6 py-4 text-center"><span class="text-success text-xs font-bold">在线</span></td>
                                <td class="px-6 py-4 text-right space-x-2">
                                    <button type="button" @click="testServer(server.id)" :disabled="testingId === server.id" class="text-xs bg-success/10 text-success hover:bg-success hover:text-white px-3 py-1 rounded transition disabled:opacity-50">测试</button>
                                    <button type="button" @click="deleteServer(server.id)" class="text-xs bg-danger/10 text-danger hover:bg-danger hover:text-white px-3 py-1 rounded transition">删除</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div v-show="currentTab === 'bulk_deploy'" class="max-w-6xl mx-auto h-full overflow-y-auto pb-10">
                <div class="flex items-center gap-3 mb-6">
                    <h2 class="text-xl font-bold text-white">🚀 批量一键上站</h2>
                </div>

                <div class="grid grid-cols-12 gap-6">
                    <div class="col-span-5 space-y-6">
                        <div class="bg-panelbg border border-panelborder rounded-xl shadow-lg p-6">
                            <h3 class="text-sm font-bold text-gray-400 mb-4 border-b border-panelborder pb-2">📦 OBS 资源池配置</h3>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-gray-300 text-xs font-bold mb-1">EyouCMS 核心包路径 (Zip)</label>
                                    <input v-model="deployForm.coreKey" type="text" class="w-full bg-darkbg border border-panelborder rounded px-3 py-2 text-sm text-gray-300 outline-none focus:border-brand" placeholder="eyoucms/eyoucore/...">
                                </div>
                                <div>
                                    <label class="block text-gray-300 text-xs font-bold mb-1">站点前端模板路径 (Zip)</label>
                                    <input v-model="deployForm.templateKey" type="text" class="w-full bg-darkbg border border-panelborder rounded px-3 py-2 text-sm text-gray-300 outline-none focus:border-brand" placeholder="eyoucms/core/eyouz070.zip">
                                    <p class="text-[10px] text-gray-500 mt-1">引擎会先解压核心包，再解压模板包进行覆盖。</p>
                                </div>
                                <div>
                                    <label class="block text-gray-300 text-xs font-bold mb-1">自定义安全后台路径</label>
                                    <input v-model="deployForm.adminPath" type="text" class="w-full bg-darkbg border border-panelborder rounded px-3 py-2 text-sm text-gray-300 outline-none focus:border-brand">
                                </div>
                            </div>

                            <h3 class="text-sm font-bold text-gray-400 mt-6 mb-4 border-b border-panelborder pb-2">🔍 默认 SEO TDK</h3>
                            <div class="space-y-4">
                                <input v-model="deployForm.tdkTitle" type="text" class="w-full bg-darkbg border border-panelborder rounded px-3 py-2 text-sm text-gray-300" placeholder="默认标题">
                                <input v-model="deployForm.tdkKeywords" type="text" class="w-full bg-darkbg border border-panelborder rounded px-3 py-2 text-sm text-gray-300" placeholder="默认关键词">
                            </div>
                        </div>
                    </div>

                    <div class="col-span-7">
                        <div class="bg-panelbg border border-panelborder rounded-xl shadow-lg p-6 h-full flex flex-col">
                            <div class="mb-4">
                                <label class="block text-gray-300 text-sm font-bold mb-2">选择目标站群服务器 <span class="text-danger">*</span></label>
                                <select v-model="deployForm.serverId" class="w-full bg-darkbg border border-panelborder rounded-md px-4 py-3 text-sm outline-none focus:border-brand text-gray-200">
                                    <option value="">-- 请选择挂载的服务器 --</option>
                                    <option v-for="srv in servers" :key="srv.id" :value="srv.id">{{ srv.name }} ({{ srv.main_ip }})</option>
                                </select>
                            </div>

                            <div class="flex-1 flex flex-col min-h-[300px]">
                                <div class="flex justify-between items-end mb-2">
                                    <label class="block text-gray-300 text-sm font-bold">单站域名与绑定的独立 IP <span class="text-danger">*</span></label>
                                    <span class="text-xs text-brand font-bold">队列任务数：{{ lineCount }}</span>
                                </div>
                                <textarea v-model="deployForm.domainsText" @input="updateLineCount" class="w-full flex-1 bg-darkbg border border-panelborder rounded-md px-4 py-3 text-sm font-mono text-gray-300 outline-none focus:border-brand resize-none" placeholder="www.domain1.com|198.44.250.9&#10;www.domain2.com|198.44.250.10"></textarea>
                            </div>

                            <div class="pt-4 mt-auto">
                                <button type="button" @click="submitDeploy" :disabled="isDeploying || !deployForm.serverId" :class="['w-full font-bold py-3.5 rounded-lg shadow-lg transition-all text-lg flex items-center justify-center', (isDeploying || !deployForm.serverId) ? 'bg-gray-600 text-gray-400 cursor-not-allowed' : 'bg-brand hover:bg-brand/80 text-white shadow-brand/20']">
                                    <i :class="['fa-solid mr-2', isDeploying ? 'fa-spinner fa-spin' : 'fa-bolt']"></i> 
                                    {{ isDeploying ? '指令下发中...' : '确认下发战群部署指令' }}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    </div>

<script>
    const { createApp, ref, reactive, onMounted } = Vue;
    // ⚠️⚠️⚠️ 终极发车注意：这里请填入你真实的云服务器公网 IP！！！
    const API_BASE_URL = 'http://你的云服务器IP:8230/api'; 

    const parseErrorSafe = (err) => {
        if (typeof err === 'string') return err;
        if (err?.response?.data?.detail) return typeof err.response.data.detail === 'string' ? err.response.data.detail : JSON.stringify(err.response.data.detail);
        return err?.message || '未知网络错误';
    };

    const axiosInstance = axios.create({ baseURL: API_BASE_URL, timeout: 10000 });
    axiosInstance.interceptors.response.use(res => res.data, err => Promise.reject(parseErrorSafe(err)));

    createApp({
        setup() {
            // ... (复用之前的 Server 管理代码) ...
            const currentTab = ref('bulk_deploy'); // 默认切到上站界面
            const apiUrl = ref(API_BASE_URL);
            const apiStatus = ref('checking');
            const toasts = ref([]);
            const servers = ref([]);
            
            const showToast = (text, type = 'success') => {
                const id = Date.now() + Math.random();
                toasts.value.push({ id, text: String(text), type });
                setTimeout(() => { toasts.value = toasts.value.filter(t => t.id !== id); }, 5000);
            };

            const fetchServers = async () => {
                try { servers.value = await axiosInstance.get('/servers/'); } catch(e) {}
            };

            const checkHealth = async () => {
                try {
                    await axios.get(API_BASE_URL.replace('/api', '/'));
                    apiStatus.value = 'online';
                } catch (e) {
                    apiStatus.value = 'offline';
                }
            };

            // 💡 核心部署表单，已绑定你的真实 OBS 路径
            const deployForm = reactive({ 
                serverId: '', 
                domainsText: '',
                coreKey: 'eyoucms/eyoucore/EyouCMS-V1.7.8-UTF8-SP1_0125.zip',
                templateKey: 'eyoucms/core/eyouz070.zip',
                adminPath: 'console_v8x.php',
                tdkTitle: '全新站群官网',
                tdkKeywords: '企业,官网,站群'
            });
            const lineCount = ref(0);
            const isDeploying = ref(false);

            const updateLineCount = () => {
                lineCount.value = deployForm.domainsText.split('\n').filter(l => l.trim().includes('|')).length;
            };

            const submitDeploy = async () => {
                if(!deployForm.serverId) return showToast('请选择服务器', 'warning');
                const validLines = deployForm.domainsText.split('\n').filter(l => l.trim().includes('|'));
                if(validLines.length === 0) return showToast('未检测到合法格式的域名配置', 'warning');

                const sites = validLines.map(line => {
                    const [domain, bind_ip] = line.split('|').map(i => i.trim());
                    return { domain, bind_ip };
                });

                isDeploying.value = true;
                try {
                    // 新增了 core_key 的发送
                    const res = await axiosInstance.post('/deploy/batch', {
                        server_id: deployForm.serverId,
                        sites: sites,
                        core_key: deployForm.coreKey,
                        template_key: deployForm.templateKey,
                        admin_path: deployForm.adminPath,
                        tdk_config: { title: deployForm.tdkTitle, keywords: deployForm.tdkKeywords, description: "" }
                    });
                    showToast(res.message, 'success');
                    deployForm.domainsText = '';
                    updateLineCount();
                } catch(e) { showToast(e, 'error'); }
                finally { isDeploying.value = false; }
            };

            onMounted(() => {
                checkHealth();
                fetchServers();
            });

            return {
                currentTab, apiUrl, apiStatus, toasts, showToast, servers,
                deployForm, lineCount, updateLineCount, isDeploying, submitDeploy
            };
        }
    }).mount('#app');
</script>
</body>
</html>
